name: smart_class_app
description: Smart Class Check-in & Learning Reflection App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # localStorage for web, key-value file for mobile
  shared_preferences: ^2.3.2

  # GPS location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # QR code scanner
  mobile_scanner: ^5.2.3

  # Date formatting
  intl: ^0.19.0

  # UUID generation
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
